# 카탈로그 · 코호트 · 세미나 · 학생 — 누구나 이해하는 가이드

> **이 문서의 목적**: WLICC 학사 시스템의 4대 개념(카탈로그·코호트·세미나·학생)과 과목(코스)이 **어떻게 맞물려 돌아가는지**를, 개발을 모르는 사람도 이해할 수 있게 설명한다.
> 기술적인 단일 권위 문서는 `WLICC.md`. 이 문서는 그 **쉬운 버전**이다.
> 작성: 2026-06-05

---

## 0. 가장 먼저 — 한 장 요약

| 개념 | 한 문장 | 비유 | 가진 것 | 안 가진 것 |
|------|---------|------|---------|-----------|
| **카탈로그** | 이 학위를 **졸업하려면 뭘 들어야 하는지** 적은 표 | 졸업 **체크리스트** | 필수·선택 과목 목록, 학점 | 학생·돈·날짜 ❌ |
| **코호트** | 그 체크리스트로 운영하는 **실제 한 기수(반)** | 2026년 베트남 **1반** | 학생들, 비용, 일정, 온/오프라인 | 졸업 기준의 권위 ❌ |
| **세미나** | **실제 수업 한 번** | 3월 갈라디아서 **수업** | 강사, 출석, 성적 | — |
| **학생** | 반(코호트)에 들어가서 수업을 듣는 사람 | 학생 | 자기 체크리스트 사본, 성적표 | — |

**한 줄로**: 카탈로그(체크리스트)를 만들고 → 그걸로 코호트(반)를 열고 → 학생이 들어가서 → 세미나(수업)를 들으면 → 체크리스트가 채워지고 → 다 채우면 졸업.

---

## 1. 큰 그림 — 비유로

BEE 학위 과정을 **운전면허 따기**에 비유해 봅시다.

- **카탈로그 = 면허 취득 요건표**: "1종 보통 면허를 따려면 → 학과 시험 + 기능 시험 + 도로주행을 통과해야 함." 이건 **누가 언제 시험 보든 똑같이 적용되는 기준**이에요. 한 사람이 마음대로 "난 도로주행 빼고 딸래" 할 수 없죠.

- **코호트 = 이번 달 운전학원 X반**: "2026년 3월 강남운전학원 주말반." 실제로 사람들이 모여서 배우는 단위. 비용도 여기서 내고, 일정도 여기서 정해요. 하지만 **"면허 따려면 뭐가 필요한가"를 이 학원이 바꿀 순 없어요** — 그건 요건표(카탈로그)가 정하니까.

- **세미나 = 실제 수업 한 번**: "3월 5일 도로주행 연습." 강사가 있고, 출석하고, 통과/불통과가 나와요.

- **학생 = 면허 준비생**: 학원(코호트)에 등록하고, 수업(세미나)을 들으면, 자기 요건표가 하나씩 체크돼요.

→ 핵심: **"무엇을 통과해야 면허냐"(요건)와 "어느 학원에서 배우냐"(운영)는 별개**입니다. 이 둘을 섞으면 헷갈려요.

---

## 2. 네 가지를 하나씩 — 무엇을 담고, 무엇을 안 담나

### 2-1. 카탈로그 = 졸업 체크리스트

**"이 학위를 졸업하려면 이 과목들을 이만큼 들어야 한다"**를 적은 표입니다.

```
📋 베트남 BTh 2026 카탈로그
┌────────────────────────────────────┐
│ [필수] 갈라디아서        2학점        │
│ [필수] 요한복음          3학점        │
│ [필수] 성경이야기체연구  2학점        │
│ [선택] (BEE 과목 중 1개) 3학점        │
│ ...                                  │
│ 총 120학점 필요                       │
└────────────────────────────────────┘
```

- **담는 것**: 어떤 과목이 필수/선택인지, 각 몇 학점인지, 총 몇 학점이 필요한지.
- **안 담는 것**: 학생 명단(❌), 비용(❌ — 비용은 코호트에서), 수업 날짜(❌).
- 나라마다·버전마다 따로 있어요: "한국 BTh 2025", "베트남 BTh 2026" 등.

### 2-2. 코호트 = 실제 한 기수(반)

**그 체크리스트로 운영하는 실제 학생 그룹**입니다.

```
👥 2026년 베트남 BTh 1반 (코호트)
   ├ 따르는 체크리스트: 베트남 BTh 2026 카탈로그
   ├ 학생: 흐엉, 민, 란, ... (12명)
   ├ 비용: 학점당 $15
   ├ 기간: 2026.3 ~ 2029.2
   └ 방식: 오프라인 (호치민) + 일부 온라인
```

- **담는 것**: 학생 명단, 비용, 일정, 온/오프라인, 이번 기수에 개설할 과목.
- **안 담는 것**: 졸업 기준 자체(그건 카탈로그가 정함). 코호트는 "이번 반은 이 기준으로 운영한다"고 **가리킬** 뿐, 기준을 바꿀 권한은 없어요.

### 2-3. 세미나 = 실제 수업 한 번

**특정 시점에 실제로 열리는 한 과목 수업**입니다.

```
📖 2026년 3월 갈라디아서 세미나
   ├ 가르친 내용(원형): 갈라디아서
   ├ 강사: 김선교 인도자
   ├ 수강생: 흐엉, 민, ... (출석·성적 기록)
   └ 이 수업이 인정될 수 있는 과목 자리: BTh N409 / MDiv N509 / DPM N009
```

- 학생이 이 수업을 들으면 → 그 학생 성적표에 기록되고 → 체크리스트의 해당 칸이 채워져요.

### 2-4. 학생 = 반에 들어가 수업을 듣는 사람

학생은 **코호트(반)에 들어가고**, 입학할 때 **"너는 이 체크리스트를 따른다"고 지정**받아요. 그리고 수업을 들을 때마다 체크리스트가 채워집니다.

```
🎓 흐엉 (학생)
   ├ 소속 반: 2026년 베트남 BTh 1반
   ├ 따르는 체크리스트: 베트남 BTh 2026  ← 입학 때 지정됨 (★중요)
   └ 들은 수업: 갈라디아서 ✓(2학점), 요한복음 ✓(3학점), ...
```

## 3. 과목(코스)의 3겹 — 갈라디아서로 이해하기

여기가 두 번째로 헷갈리는 곳이에요. 같은 "갈라디아서"가 과정마다 다르게 쓰입니다.

**과거(AppSheet)**: 같은 갈라디아서를 과정마다 3줄로 따로 적었어요.
```
갈라디아서  DPM   과목번호 N009   2학점
갈라디아서  BTh   과목번호 N409   2학점
갈라디아서  MDiv  과목번호 N509   1학점   ← 학점이 다름!
```

**지금(mmv2)**: 이걸 **3겹으로 분리**했어요.

| 겹 | 이름 | 갈라디아서의 경우 | 비유 |
|----|------|-------------------|------|
| 1겹 | **원형** (교재) | "갈라디아서" **1개** | 책 한 권 |
| 2겹 | **슬롯** (과목 자리) | N009(DPM)·N409(BTh)·N509(MDiv) **3개** | 그 책이 각 학위에서 차지하는 "자리" |
| 3겹 | **엔트리** (카탈로그 속 학점) | 베트남BTh표→N409=2학점 / 한국MDiv표→N509=1학점 | 그 자리가 특정 체크리스트에서 받는 학점 |

→ **핵심**: "갈라디아서"라는 책은 하나예요. 그런데 **과목번호는 학위마다 다르고(슬롯), 학점은 나라·버전마다 다릅니다(엔트리).** 그래서 갈라디아서 자체에는 "과목번호"나 "학점"이 하나로 정해질 수 없어요 — 어느 과정·어느 카탈로그에서 보느냐에 따라 달라지니까요.

**그래서 "갈라디아서 상세"를 보면 이렇게 나와야 맞아요:**
```
📖 갈라디아서 (교재: ..., 약어: G)

이 과목이 쓰이는 곳:
┌────────┬──────────┬───────────────────┬──────┐
│ 과정    │ 과목번호  │ 카탈로그            │ 학점  │
├────────┼──────────┼───────────────────┼──────┤
│ DPM    │ N009     │ (디플로마)          │ 2    │
│ BTh    │ N409     │ 베트남 BTh 2026     │ 2    │
│ MDiv   │ N509     │ 한국 MDiv 2025      │ 1    │
└────────┴──────────┴───────────────────┴──────┘
```

## 4. 한 학생의 졸업 여정 — 스토리로 따라가기

**흐엉**의 BTh 졸업 이야기로 전체 흐름을 봅시다.

**① 입학** — 흐엉이 "2026년 베트남 BTh 1반"(코호트)에 등록합니다.
- 이때 시스템이 **"흐엉의 졸업 기준 = 베트남 BTh 2026 카탈로그"**라고 흐엉에게 도장을 찍습니다. (이걸 **스냅샷**이라고 해요)
- 흐엉의 체크리스트: 45과목, 120학점 필요.

**② 수업 수강** — 흐엉이 "3월 갈라디아서 세미나"를 듣고 통과합니다.
- 흐엉 성적표에 **"갈라디아서 이수 ✓"** 기록 → 체크리스트 갈라디아서 칸 채워짐(2학점).
- ⭐ 이 기록은 **흐엉에게** 남아요. 코호트가 아니라.

**③ 반 이동** — 사정이 생겨 흐엉이 "2026년 베트남 BTh 2반"으로 옮깁니다.
- 흐엉의 **체크리스트(베트남 BTh 2026)는 그대로** 따라갑니다.
- 흐엉이 이미 들은 갈라디아서도 **그대로 인정**됩니다.
- → **반을 옮겨도 졸업에 아무 지장 없어요.** (성적표와 체크리스트는 흐엉 가방 안에 있으니까)

**④ 졸업** — 흐엉이 체크리스트의 모든 칸을 채우고 120학점을 모으면 졸업.

## 5. 자주 헷갈리는 질문 (FAQ)

### Q1. 학생은 코호트(반)에 묶이나요, 카탈로그(체크리스트)에 묶이나요?
**둘 다예요, 역할이 달라서.**
- **운영**상으로는 코호트(반)에 묶입니다 (어디서 수업 듣나).
- **졸업 기준**으로는 카탈로그(체크리스트)에 묶입니다 (입학 때 도장 찍힌 그 버전).

### Q2. 반(코호트)을 옮기면 졸업 못 하나요?
**기본적으로 안전합니다 — 단, 한 가지 조건이 있어요.**
- 들은 수업(성적표)은 **학생 본인에게 영구 기록** → 반을 옮겨도 절대 안 사라짐.
- **체크리스트(카탈로그)를 그대로 유지하면** → 들은 수업 그대로 인정 → 졸업 지장 0. **(이게 기본 규칙이어야 함: 반을 옮겨도 학생의 카탈로그는 자동으로 바꾸지 않는다.)**
- ⚠️ **반을 옮기면서 체크리스트까지 다른 걸로 바꾸면** → 들은 수업이 새 체크리스트에 **해당 칸(슬롯)이 없을 수** 있어요. 이땐 자동 인정하면 안 되고, **"이 수업을 이 칸으로 인정한다"는 수동 승인(대체인정·예외처리)**이 필요합니다. 카탈로그 변경은 사유 기록(audit log)과 함께 별도 승인 행위로 처리해야 합니다.

### Q3. 그럼 카탈로그(체크리스트)를 수정하는 건 왜 위험한가요?
**이미 그 체크리스트를 따르는 학생이 있을 때만 위험해요.**
- 학생에게 찍은 도장은 **"너는 5번 체크리스트를 본다"는 가리킴**이지, 체크리스트 내용을 복사해 둔 게 아니에요.
- 그래서 **5번 체크리스트 자체를 고치면 → 5번을 보는 모든 학생에게 반영**됩니다. (이미 다니는 학생의 졸업 기준이 도중에 바뀜 = 불공평)
- **비유**: 학생증에 "5번 메뉴판 보세요" 도장을 찍어뒀는데, 5번 메뉴판 자체를 고쳐 쓰면 → 5번 도장 찍힌 모두가 바뀐 메뉴판을 봐요.

### Q4. 그런데 반(코호트)의 카탈로그를 바꾸는 건 괜찮다면서요? 모순 아닌가요?
**모순 아니에요. 둘은 다른 동작이에요.**
- **카탈로그 수정** = 메뉴판 5번 **내용을 고침** → 5번 보는 학생 모두 영향 🔴
- **코호트 카탈로그 교체** = 새 기수에게 **"너희는 7번 봐"** → 기존 학생은 여전히 5번 ✅
- 즉 하나는 *보고 있던 문서를 고치는 것*, 다른 하나는 *새 사람에게 다른 문서를 가리키게 하는 것*.

### Q5. 그럼 커리큘럼이 진짜 바뀌면(과목 추가 등) 어떻게 하나요?
| 상황 | 방법 |
|------|------|
| 아직 학생 없는 카탈로그 | 그냥 수정 |
| 학생 있는데 오타·보정 | 그냥 수정 (의미 안 바뀜) |
| 학생 있는데 **졸업요건이 진짜 바뀜** | **복제해서 새 카탈로그(새 버전)** 만들고 새 기수에 연결. 기존 학생은 옛 버전 그대로 |

→ "새 버전 만들기" = "복제해서 새 코호트에 연결". **버전은 그냥 체크리스트를 구분하는 이름표**예요.

### Q6. 버전(version)이 정확히 뭔가요?
체크리스트가 **언제 기준이냐**를 구분하는 꼬리표예요. 커리큘럼은 몇 년에 한 번 개정되는데, 2025년 입학생은 2025 기준으로, 2027 개정 후 입학생은 2027 기준으로 졸업하게 하려고 구분합니다. **개정이 없으면 버전 하나로 쭉 써도 됩니다.**

### Q7. 다른 나라에서 온라인으로 들으면 어느 카탈로그인가요?
카탈로그의 "국가"는 **"이 체크리스트가 어느 기준이냐"**이지 학생이 사는 곳이 아니에요. 학생은 **자기가 등록한 코호트의 카탈로그**를 따릅니다. 특정 나라에 안 매이는 순수 온라인 과정이면 **"글로벌 카탈로그"(국가 없음)**를 만들어 운영합니다.

## 7. 운영자 실무 절차 — 어디를 클릭하나 (2026-07-24)

개념은 위에서 봤고, 실제 운영은 이 순서다.

### 7-1. 학생이 신청할 수 있게 "열기" (⚠️ 이 두 관문을 안 열면 신청 자체가 막힘)
1. **카탈로그를 Active로**: `Academy → 카탈로그 → (예) 베트남 BTh 2026 → 상태 Active 저장`. (본부 Lv0-1)
   - Active여야 하는 이유 = 입학생이 이 카탈로그를 **졸업기준으로 도장(스냅샷)** 찍기 때문. Draft(미완성)면 막는다. → 이걸 안 하면 코호트에서 `catalog_not_active` 오류.
2. **코호트를 "신청 받는 중"으로**: `Academy → 프로그램 → 코호트 → "신청 받는 중" 체크 → 저장`.
   - 그래야 공개 신청폼(`/wlicc-apply`)의 코호트 드롭다운에 뜬다. 안 열면 학생 화면에 "위 항목 먼저 선택"만 보임.

### 7-2. 신청서 심사 (`/applications` → 상세)
`submitted → (지부장/담당자 RD 승인) → (본부 승인 Lv0-1) → 학적 자동 생성`. 거절/반송 가능.
- ⚠️ **공개 신청자(로그인 없이 제출)는 본인 Google 계정 연결이 먼저**여야 최종 승인 가능(이메일 일치로 신청서가 자동으로 그 멤버에 연결됨). 안 되어 있으면 본부 승인이 막힌다.
- 상세 우측에서 코호트 재배정 가능.

### 7-3. 커리큘럼(카탈로그)을 고쳐야 할 때
- **Draft 상태면** → 바로 편집(과목 추가/수정). 아직 학생 도장 안 찍혔으면 이게 제일 쉽다 → **활성화 전에 확정**하는 게 최선.
- **Active이거나 학생이 이미 물렸으면** → 편집 동결. **복제(clone) → 새 버전 수정 → 새 버전 Active → 코호트를 새 버전으로 연결**. 기존 학생은 옛 버전 유지(학적·진도 보존).
- ❌ 학생을 코호트에서 "제거"해서 우회하지 말 것 — 제거 = 그 학생 **학적(진도 포함) 삭제**다.

### 7-4. 누가 하나 (권한)
| 작업 | 권한 |
|---|---|
| 공개 신청 제출 | 누구나(무로그인) |
| RD 승인·코호트 배정 | Lv0-2 + WLICC 담당자(자기국가) |
| 본부 최종 승인·카탈로그 Active | Lv0-1 |
| 코호트 편집(신청 토글) | Lv≤3 |

## 8. 핵심 원칙 5줄 (이것만 기억하면 됨)

1. **카탈로그 = 졸업 체크리스트** (무엇을 채워야 졸업이냐 — 기준).
2. **코호트 = 반** (누가·얼마에·언제 — 운영). 기준을 바꿀 권한은 없음.
3. **들은 수업과 체크리스트는 학생 본인에게** 기록됨 → 반 옮겨도 안전.
4. **학생 붙은 카탈로그는 고치지 말 것** (소급됨). 바꾸려면 복제 → 새 버전 → 새 기수.
5. **버전 = 체크리스트의 이름표** (언제 기준이냐). 개정 없으면 하나로 충분.

| 이 문서 용어 | DB 테이블 | 비고 |
|-------------|----------|------|

| 학생 성적표(이수) | `enrollments` (학생↔세미나) | 코호트와 독립 — 그래서 반 이동 안전 |

> ⚠️ 현재 미완성 (우선순위 순):
> 1. ✅ **`cohorts.catalog_id` 명시 연결 완료** (2026-06-05) — 코호트가 카탈로그를 명시하고, 학생 승인·수동추가 시 `cohort.catalog_id` 우선·없으면 `getActiveCatalogId(program, country)` fallback. 정합성 가드: 같은 학위과정+(글로벌 또는 같은 국가) 카탈로그만 / '신청 받기' 켜거나 학생 추가 시 카탈로그 스냅샷 null 차단 / 반 이동은 같은 학위과정만.
