<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔒 FM 현지화 구현 기획서</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *,*::before,*::after{box-sizing:border-box}
  :root{--paper:#f7f3ea;--card:#fffdf8;--ink:#21304d;--muted:#77715f;--accent:#b0802a;--accent-soft:#e9dcbd;--line:#e2dac9;}
  @media(prefers-color-scheme:dark){:root{--paper:#12161f;--card:#1a2029;--ink:#eae3d3;--muted:#948d7c;--accent:#d6a94e;--accent-soft:#3a3320;--line:#2b323d;}}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;padding:20px;}
  .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px 26px;max-width:380px;width:100%;
    box-shadow:0 8px 30px rgba(0,0,0,.12);text-align:center;}
  .lock{font-size:34px;margin-bottom:10px;}
  h1{font-family:Georgia,serif;font-size:20px;margin:0 0 4px;}
  p.t{color:var(--muted);font-size:14px;margin:0 0 20px;}
  form{display:flex;flex-direction:column;gap:10px;}
  input{font-size:17px;padding:13px 14px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);text-align:center;}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  button{font-size:16px;font-weight:700;padding:13px;border:none;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer;}
  button:hover{filter:brightness(1.05);}
  .err{color:#c0392b;font-size:13.5px;min-height:18px;margin-top:4px;}
  @media(prefers-color-scheme:dark){.err{color:#ff8a7a;}}
  .hint{color:var(--muted);font-size:12px;margin-top:14px;}
</style>
</head>

  function b64(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
  var KEYNAME="ca_pw_"+location.pathname;
  async function tryUnlock(pw){
    var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    var buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(DATA));
    return new TextDecoder().decode(buf);
  }
  function render(html){document.open();document.write(html);document.close();}
  document.getElementById("f").addEventListener("submit",async function(ev){
    ev.preventDefault();
    var pw=document.getElementById("pw").value, e=document.getElementById("e");
    e.textContent="";
    try{var html=await tryUnlock(pw);try{sessionStorage.setItem(KEYNAME,pw);}catch(_){}render(html);}
    catch(err){e.textContent="비밀번호가 올바르지 않습니다 · Wrong password";}
  });
  (async function(){try{var s=sessionStorage.getItem(KEYNAME);if(s){var html=await tryUnlock(s);render(html);}}catch(_){}})();
