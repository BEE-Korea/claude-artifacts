<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Artifacts · BEE Korea</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  :root{
    --paper:#f7f3ea; --card:#fffdf8; --ink:#21304d; --ink-soft:#46506a;
    --muted:#77715f; --accent:#b0802a; --accent-soft:#e9dcbd; --line:#e2dac9;
    --ko-bg:#f0ead9; --ko:#4a4636;
    --shadow:0 1px 2px rgba(33,48,77,.05),0 8px 28px rgba(33,48,77,.07);
  }
  @media (prefers-color-scheme:dark){
    :root{--paper:#12161f;--card:#1a2029;--ink:#eae3d3;--ink-soft:#c3bdae;
      --muted:#948d7c;--accent:#d6a94e;--accent-soft:#3a3320;--line:#2b323d;
      --ko-bg:#1f2530;--ko:#b9b2a0;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);}
  }
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:820px;margin:0 auto;padding:0 20px 80px;}
  header{padding:60px 0 30px;border-bottom:1px solid var(--line);margin-bottom:28px;}
  .eyebrow{font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 14px;}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(30px,5vw,44px);line-height:1.12;margin:0 0 10px;letter-spacing:-.01em;}
  .sub{color:var(--ink-soft);font-size:17px;margin:0;}
  .slogan{color:var(--accent);font-family:Georgia,serif;font-style:italic;font-size:15px;margin-top:12px;}
  .group-title{font-family:Georgia,serif;font-size:15px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:30px 0 14px;font-weight:700;}
  .grid{display:grid;gap:16px;}
  a.cardlink{text-decoration:none;color:inherit;display:block;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--shadow);
    transition:transform .12s ease,border-color .12s ease;display:flex;gap:16px;align-items:flex-start;}
  a.cardlink:hover .card{transform:translateY(-2px);border-color:var(--accent);}
  a.cardlink:focus-visible .card{outline:2px solid var(--accent);outline-offset:2px;}
  .ico{font-size:26px;line-height:1;flex:none;margin-top:2px;}
  .body{flex:1;min-width:0;}
  .ct{font-family:Georgia,serif;font-size:19px;color:var(--ink);margin:0 0 3px;}
  .ck{font-size:13.5px;color:var(--muted);margin:0 0 8px;}
  .cd{font-size:14.5px;color:var(--ink-soft);margin:0;}
  .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;padding:2px 9px;border-radius:999px;margin-top:10px;}
  .tag.public{background:var(--accent-soft);color:var(--ink);}
  .tag.locked{background:#e4d3c4;color:#7a4a20;}
  @media (prefers-color-scheme:dark){.tag.locked{background:#40301f;color:#e0b483;}}
  .arrow{color:var(--accent);font-size:20px;align-self:center;flex:none;}
  footer{margin-top:40px;padding-top:20px;border-top:1px dashed var(--line);color:var(--muted);font-size:13px;text-align:center;}
  .empty{color:var(--muted);font-size:14px;padding:20px 0;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:999px;
    padding:6px 15px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;
    transition:background .12s,color .12s,border-color .12s;}
  .chip:hover{border-color:var(--accent);}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip .n{opacity:.7;font-weight:500;margin-left:3px;}
  .tag.internal{background:var(--ko-bg);color:var(--ko);}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">BEE Korea · Shared Resources</p>
      <h1>Claude Artifacts</h1>
      <p class="sub">BEE Korea 자료 모음 — 폰·PC 어디서나 열리는 링크 하나</p>
      <p class="slogan">With the Word, to the World · 말씀으로 세계로</p>
    </header>

    <div class="filters" id="filters"></div>
    <div id="hub"><p class="empty">불러오는 중…</p></div>

    <footer>🔒 표시가 붙은 비공개 문서는 비밀번호가 있어야 열립니다 (내용은 암호화). 비번은 태남 님에게 문의.<br>Made with Claude · BEE Korea · 새 자료가 추가되면 이 페이지에 자동으로 나타납니다</footer>
  </div>

  <script>
    // 허브 카드 = artifacts.json 단일 목록에서 생성. 카드 추가/수정은 그 파일만.
    // 초기화면 필터(전체/공개/비공개)로 골라 봄. 모든 자료가 목록에 뜸(숨김 없음).
    (function () {
      var hub = document.getElementById('hub'), filters = document.getElementById('filters');
      var LIST = [], current = 'all';
      function el(tag, cls, text) {
        var n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text != null) n.textContent = text;
        return n;
      }
      function isPublic(a) { return a.visibility !== 'private'; }
      function card(a) {
        var link = el('a', 'cardlink'); link.href = a.path;
        var c = el('div', 'card');
        c.appendChild(el('div', 'ico', a.icon || '📄'));
        var body = el('div', 'body');
        body.appendChild(el('p', 'ct', a.title || a.path));
        if (a.kicker) body.appendChild(el('p', 'ck', a.kicker));
        if (a.desc) body.appendChild(el('p', 'cd', a.desc));
        var tag;
        if (isPublic(a)) tag = el('span', 'tag public', '공개 · Public');
        else if (a.locked) tag = el('span', 'tag locked', a.lockLabel || '🔒 비번 필요');
        else tag = el('span', 'tag internal', '내부 · Internal');
        body.appendChild(tag);
        c.appendChild(body);
        c.appendChild(el('div', 'arrow', '→'));
        link.appendChild(c);
        return link;
      }
      function render() {
        var rows = LIST.filter(function (a) {
          if (current === 'public') return isPublic(a);
          if (current === 'private') return !isPublic(a);
          return true;
        });
        hub.innerHTML = '';
        if (!rows.length) { hub.appendChild(el('p', 'empty', '해당하는 자료가 없습니다.')); return; }
        var order = [], byGroup = {};
        rows.forEach(function (a) {
          var g = a.group || '기타';
          if (!byGroup[g]) { byGroup[g] = []; order.push(g); }
          byGroup[g].push(a);
        });
        order.forEach(function (g) {
          hub.appendChild(el('div', 'group-title', g));
          var grid = el('div', 'grid');
          byGroup[g].forEach(function (a) { grid.appendChild(card(a)); });
          hub.appendChild(grid);
        });
      }
      function chip(key, label, count) {
        var b = el('button', 'chip' + (key === current ? ' on' : ''));
        b.appendChild(document.createTextNode(label));
        var n = el('span', 'n', '(' + count + ')'); b.appendChild(n);
        b.onclick = function () {
          current = key;
          [].forEach.call(filters.children, function (c) { c.classList.remove('on'); });
          b.classList.add('on');
          render();
        };
        return b;
      }
      fetch('artifacts.json', { cache: 'no-cache' })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var items = (data && data.items) || [];
          var superseded = {};
          items.forEach(function (a) { if (a.supersedes) superseded[a.supersedes] = 1; });
          LIST = items.filter(function (a) { return a.status !== 'archived' && !superseded[a.path]; });
          var pub = LIST.filter(isPublic).length, prv = LIST.length - pub;
          filters.innerHTML = '';
          filters.appendChild(chip('all', '전체', LIST.length));
          filters.appendChild(chip('public', '공개', pub));
          filters.appendChild(chip('private', '🔒 비공개', prv));
          render();
        })
        .catch(function () {
          hub.innerHTML = '';
          hub.appendChild(el('p', 'empty', '목록을 불러오지 못했습니다. 새로고침 해주세요.'));
        });
    })();
  </script>
</body>
</html>
